# Cloudflare Workers config for Trak (Next.js via OpenNext)
# https://opennext.js.org/cloudflare

name = "trak"
main = ".open-next/worker.js"
# Use 2025-05-05+ for FinalizationRegistry and newer runtime fixes (see OpenNext troubleshooting)
compatibility_date = "2025-05-05"
compatibility_flags = ["nodejs_compat"]

[assets]
directory = ".open-next/assets"
binding = "ASSETS"

# D1 database for profiles (see README: create DB then set database_id)
# [[d1_databases]]
# binding = "DB"
# database_name = "trak1-db"
# database_id = "<paste-from-wrangler-d1-create-output>"
